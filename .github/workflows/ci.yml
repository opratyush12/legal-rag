# ── CI: Lint + Test on every PR and push ──────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:      # allow deploy.yml to call this as a reusable workflow

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + test ────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Ruff lint
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        run: ruff format app/ --check

      - name: Run tests
        run: pytest tests/ -v --tb=short -q
        env:
          GROQ_API_KEY: ""
          CORS_ORIGINS: '["http://localhost:3000"]'

  # ── Frontend: lint + type-check + build ─────────────────────────────────────
  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check + Build
        run: npm run build
